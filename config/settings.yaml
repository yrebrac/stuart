tool-servers:
  linux:
    journald:
      description: "Journal log query tools"
      enabled: true
    systemd:
      description: "Systemd service inspection tools"
      enabled: true
    block-device:
      description: "Storage and filesystem tools"
      enabled: true
    syslog:
      description: "Flat-file log analysis tools"
      enabled: true
    serial-device:
      description: "USB, Thunderbolt, and serial port tools"
      enabled: true
    network:
      description: "Network diagnostics tools"
      enabled: true
    virtual:
      description: "Virtualisation inspection and lifecycle tools"
      enabled: true
    performance:
      description: "System performance and resource monitoring tools"
      enabled: true
    packages:
      description: "Package management query tools"
      enabled: true
  container:
    container:
      description: "Docker/Podman container tools"
      enabled: true

permissions:
  allow:
    WebSearch:
      description: "Allow Claude to search the web"
      enabled: true
